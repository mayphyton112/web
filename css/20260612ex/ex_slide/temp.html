<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>position</title>
    <style>
        div{
            width: 300px;
            height: 100px;
            text-align: center;
        }
        div.redbox{
            background-color: red; /* 해당위치에 고정*/
            position: fixed;
            top: 0;
            left: 0;
        }

        div.greenbox{
            background-color: green; /*원래 있던 위치를 기준으로 이동한다. 즉 원래 값을 바탕으로 함*/
            position: relative;
            top: 50px; /* 원래 위치에서 50픽셀 아래로*/
            left: 100px; /*원래 위치에서 100픽셀 오른쪽으로*/
        }

        div.bluebox{
            background-color: blue;
            position: absolute; /* 가장 가까운 위치 지정 부모가 이동의 기준, 없을 시 브라우저 좌상단을 기준으로 움직인다. */
            top: 500px;
            left: 700px;
        }
        /*absolute의 속성을 가진 태그의 부모가 relative일 경우 부모 박스의 왼쪽 위에 붙는다. 
          이 둘을 같이 쓰는 것은 부모는 기준점이 되고 자식이 그 기준점 안에서 자유롭게 배치할 수 있기 때문*/
    </style>
</head>
<body>
    <div class="redbox">첫 번째 요소</div>
    <div class="greenbox">첫 번째 요소</div> 
    <div class="bluebox">첫 번째 요소</div>

    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    
</body>
</html>
